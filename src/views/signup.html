<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; background: #111; color: #e0e0e0; }
    nav { background: #000; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
    nav a { color: #aaa; text-decoration: none; margin-left: 1.5rem; }
    nav a:hover { color: #2ecc71; }
    nav .brand { color: #2ecc71; font-size: 1.25rem; font-weight: bold; }
    .container { max-width: 400px; margin: 4rem auto; padding: 2rem; background: #1a1a1a; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
    .container h1 { margin-bottom: 1.5rem; text-align: center; color: #fff; }
    label { display: block; margin-bottom: 0.25rem; font-weight: 500; color: #ccc; }
    input { width: 100%; padding: 0.6rem; margin-bottom: 1rem; border: 1px solid #333; border-radius: 4px; font-size: 1rem; background: #222; color: #fff; }
    button { width: 100%; padding: 0.75rem; background: #2ecc71; color: #000; font-weight: bold; border: none; border-radius: 4px; font-size: 1rem; cursor: pointer; }
    button:hover { background: #27ae60; }
    .footer-text { text-align: center; margin-top: 1rem; font-size: 0.9rem; color: #aaa; }
    .footer-text a { color: #2ecc71; }
  </style>
</head>
<body>
  <nav>
    <span class="brand">James Lewis' Finnhub.io App</span>
    <div>
      <a href="/">Home</a>
      <a href="/signup">Sign Up</a>
    </div>
  </nav>
  <div class="container">
    <h1>Sign Up</h1>
    <form action="/api/signup" method="POST">
      <label for="name">Name</label>
      <input type="text" id="name" name="name" required>
      <label for="email">Email</label>
      <input type="email" id="email" name="email" required>
      <label for="password">Password</label>
      <input type="password" id="password" name="password" required>
      <button type="submit">Create Account</button>
    </form>
    <p class="footer-text">Already have an account? <a href="/login">Log in</a></p>
  </div>
</body>
</html>
